      }
      const variants = productVariants(product);
      if (product.hasVariants || variants.length > 0) {
        byId("product").innerHTML =
          '<section class="product-detail-card">' +
            '<div class="product-detail-head">' +
              productMedia(product, true) +
              '<h1 class="detail-title">' + customEmoji(productEmojiKey(product), "box") + escapeHtml(product.name) + '</h1>' +
              '<span class="stock-badge">' + escapeHtml(String(variants.length || product.variantCount || 0)) + ' options available</span>' +
            '</div>' +
            '<div class="detail-box product-note-card">' + escapeHtml(product.description || "Choose one option below.") + '</div>' +
          '</section>' +
          '<div class="label">Variants</div>' +
          '<section class="product-list">' +
            (variants.length ? variants.map(productCard).join("") : emptyHtml("No active variants yet.")) +
          '</section>';
        return;
      }
      const qty = qtyFor(product);
      const total = totalFor(product);
      const priceNote = product.usesResellerPrice
        ? '<div class="detail-price-note">Reseller price. Retail ' + escapeHtml(currencyMoney(product.retailPrice || product.retailPriceUsdt || 0)) + '</div>'
        : '';
      byId("product").innerHTML =
        '<section class="product-detail-card">' +
          '<div class="product-detail-head">' +
            productMedia(product, true) +
            '<h1 class="detail-title">' + customEmoji(productEmojiKey(product), "box") + escapeHtml(product.name) + '</h1>' +
            '<span class="stock-badge">' + escapeHtml(product.stockLabel) + '</span>' +
          '</div>' +
          '<div class="detail-grid">' +
            miniStat("Type", product.fulfillmentType === "manual" ? "Manual" : "Auto") +
            miniStat("Limit", product.limitLabel) +
            (product.customFieldsCount ? miniStat("Details", String(product.customFieldsCount) + " required") : "") +
          '</div>' +
          '<div class="detail-box product-note-card">' + escapeHtml(product.description || "No product note") + '</div>' +
          priceNote +
          '<section class="buy-panel">' +
            '<div class="buy-total-row"><div><span>Unit price</span><strong>' + escapeHtml(currencyMoney(product.price)) + '</strong><div class="small">per item</div></div>' +
            '<div class="qty">' +
              '<button type="button" data-action="qtyDec" ' + (qty <= product.minQty ? "disabled" : "") + '>-</button>' +
              '<input id="qtyInput" type="number" inputmode="numeric" pattern="[0-9]*" min="' + escapeHtml(product.minQty) + '" max="' + escapeHtml(product.maxQty) + '" value="' + qty + '" data-action="qtyInput" aria-label="Quantity">' +
              '<button type="button" data-action="qtyInc" ' + (qty >= product.maxQty ? "disabled" : "") + '>+</button>' +
            '</div></div>' +
            '<div class="buy-total-row"><span>Total payable</span><strong>' + escapeHtml(currencyMoney(total)) + '</strong></div>' +
            '<button class="btn full sticky-buy" type="button" data-action="buy" ' + (!product.canOrder || state.busy ? "disabled" : "") + '>' +
              (state.busy ? "Processing..." : customEmoji("buy", "cart") + "Checkout · " + currencyMoney(total)) +
            '</button>' +
          '</section>' +
        '</section>';
    }

    function metricRow(label, value) {
      return '<div class="metric-row"><strong>' + escapeHtml(label) + '</strong><span>' + escapeHtml(value) + '</span></div>';
    }

    function actionRow(label, action, meta) {
      const prefix = action === "support" ? customEmoji("support", "") : "";
      const right = meta === undefined
        ? '&rsaquo;'
        : '<span class="action-meta-value">' + escapeHtml(meta) + '</span><span>&rsaquo;</span>';
      return '<button class="action-item" type="button" data-action="' + escapeHtml(action) + '"><strong>' + prefix + escapeHtml(label) + '</strong><span class="action-meta">' + right + '</span></button>';
    }

    function roleBadge() {
      const rawRole = String(state.user.role || "user").toLowerCase();
      const role = rawRole === "owner" || rawRole === "admin" ? rawRole : "user";
      const sourceTags = Array.isArray(state.user.roleTags) ? state.user.roleTags : [];
      const hasReseller = Boolean(state.user.isReseller) || sourceTags.some((tag) => String(tag?.role || "").toLowerCase() === "reseller");
      const tags = [];
      if (hasReseller) tags.push({ role: "reseller", label: "Reseller" });
      if (role === "owner") tags.push({ role: "owner", label: "Owner" });
      else if (role === "admin") tags.push({ role: "admin", label: "Admin" });
      if (!tags.length) tags.push({ role: "user", label: state.user.roleLabel || "User" });
      return '<span class="role-badges">' + tags.map((tag) =>
        '<span class="role-badge ' + escapeHtml(tag.role) + '">' + escapeHtml(tag.label) + '</span>'
      ).join("") + '</span>';
    }

    function miniStat(label, value) {
      return '<div class="mini-stat"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value) + '</strong></div>';
    }

    function emptyHtml(text) {
      return '<div class="empty">' + escapeHtml(text) + '</div>';
    }

    function displayName() {
      return state.user.username || tg?.initDataUnsafe?.user?.first_name || "Customer";
    }

    function render() {
      if (!state.ready) return;
      if (state.tab === "home") renderHome();
      if (state.tab === "shop") renderShop();
      if (state.tab === "orders") renderOrders();
      if (state.tab === "wallet") renderWallet();
      if (state.tab === "me") renderMe();
      if (state.tab === "product") renderProduct();
    }

    function loading() {
      (byId(state.tab) || byId("shop")).innerHTML = '<div class="skeleton"></div><br><div class="skeleton"></div><br><div class="skeleton"></div>';
    }

    function enableCloseWarning() {
      if (enableCloseWarning.enabled) return;
      enableCloseWarning.enabled = true;
      try {
        tg?.enableClosingConfirmation?.();
      } catch {}
    }

    async function loadShop() {
      hideAppShell();
      setNotice("");
      if (!tg?.initData) {
        state.ready = true;
        loading();
        setNotice("Open this app from Telegram to load your shop account.", true);
        showAppShell();
        return;
      }
      enableCloseWarning();
      tg.expand();
      tg.disableVerticalSwipes?.();
      loading();
      const response = await fetch(API_BASE + "/api/bootstrap", { headers: authHeader(), cache: "no-store" });
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        throw new Error(payload.error || "Shop could not be loaded.");
      }
      state.bot = payload.bot || state.bot;
      state.user = payload.user || state.user;
      state.settings = payload.settings || state.settings;
      state.stats = payload.stats || state.stats;
      state.products = payload.products || [];
      state.orders = payload.orders || [];
      state.deposits = payload.deposits || [];
      state.transactions = payload.transactions || [];
      state.depositMethods = payload.depositMethods || [];
      state.disabledPaymentMethods = payload.disabledPaymentMethods || [];
      state.customEmojiIds = payload.customEmojiIds || {};
      state.customEmojiUrls = payload.customEmojiUrls || {};
      await preloadCustomEmojis();
      if (!methodById(state.depositMethod) && state.depositMethods[0]) state.depositMethod = state.depositMethods[0].id;
      state.ready = true;
      byId("pageTitle").textContent = pageTitle();
      syncBrandLogo();
      renderNavIcons();
      render();
      showAppShell();
    }

    async function postAction(path, body = {}) {
      const response = await fetch(API_BASE + path, {
        method: "POST",
        headers: { ...authHeader(), "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        throw new Error(payload.error || "Action failed.");
      }
      return payload;
    }

    function applyStatePayload(payload) {
      if (payload.bot) state.bot = payload.bot;
      if (payload.user) state.user = payload.user;
      if (payload.settings) state.settings = payload.settings;
      if (payload.balanceUsdt !== undefined) state.user.balanceUsdt = payload.balanceUsdt;
      if (payload.totalDepositedUsdt !== undefined) state.stats.totalDepositedUsdt = payload.totalDepositedUsdt;
      if (payload.stats) state.stats = payload.stats;
      if (payload.products) state.products = payload.products;
      if (payload.orders) state.orders = payload.orders;
      if (payload.deposits) state.deposits = payload.deposits;
      if (payload.transactions) state.transactions = payload.transactions;
      if (payload.depositMethods) state.depositMethods = payload.depositMethods;
      if (payload.disabledPaymentMethods) state.disabledPaymentMethods = payload.disabledPaymentMethods;
      if (!methodById(state.depositMethod) && state.depositMethods[0]) state.depositMethod = state.depositMethods[0].id;
      if (payload.customEmojiIds) state.customEmojiIds = payload.customEmojiIds;
      if (payload.customEmojiUrls) state.customEmojiUrls = payload.customEmojiUrls;
      void preloadCustomEmojis().then(() => {
        renderNavIcons();
        render();
      });
      if (state.product) {
        state.product = state.products.find((item) => item.id === state.product.id) || state.product;
      }
    }

    async function refreshLiveState() {
      if (!state.ready || state.liveRefreshInFlight || !tg?.initData) return;
      state.liveRefreshInFlight = true;
      try {
        const response = await fetch(API_BASE + "/api/bootstrap", {
          headers: authHeader(),
          cache: "no-store",
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "Refresh failed.");
        applyStatePayload(payload);
        syncBrandLogo();
      } catch (error) {
        console.warn("live refresh failed", error);
      } finally {
        state.liveRefreshInFlight = false;
      }
    }

    function orderPaymentMethods() {
      const methods = state.depositMethods.slice();
      if (!paymentMethodDisabled("other")) {
        methods.push({ id: "other", label: "Other Payment Methods", iconKey: "otherPayment" });
      }
      return methods;
    }

    function upiQrUrl(noteCode = "", amountInr = "") {
      const params = new URLSearchParams();
      if (noteCode) params.set("note", noteCode);
      if (amountInr) params.set("amount", amountInr);
      const suffix = params.toString();
      return API_BASE + "/api/upi-qr" + (suffix ? "?" + suffix : "");

    function collectCheckoutCustomFields() {
      const fields = Array.isArray(state.checkout?.customFields) ? state.checkout.customFields : [];
      const values = {};
      for (let index = 0; index < fields.length; index += 1) {
        const field = fields[index] || {};
        const input = document.querySelector('[data-checkout-field-index="' + String(index) + '"]');
        const value = String(input?.value || "").trim();
        if (field.required !== false && !value) {
          input?.focus?.();
          showToast("Enter " + String(field.label || "required details") + ".", true);
          return null;
        }
        if (value) values[String(field.id || index)] = value;
      }
      return values;
    }

    function deliverySummaryRow(label, value) {
      return '<div class="delivery-summary-row"><strong>' + escapeHtml(label) + '</strong><span>' + escapeHtml(value || "-") + '</span></div>';
    }

    function linkifyDeliveryItem(item) {
      const raw = String(item || "");
      const urlPattern = /https?:\/\/[^\s<>"']+/g;
      let html = "";
      let lastIndex = 0;
      let linkCount = 0;
      raw.replace(urlPattern, (match, offset) => {
        html += escapeHtml(raw.slice(lastIndex, offset));
        linkCount += 1;
        html += '<a class="delivery-link" href="' + escapeHtml(match) + '" data-open-url="' + escapeHtml(match) + '" target="_blank" rel="noopener noreferrer">' +
          '<strong>Open link ' + String(linkCount) + '</strong>' + escapeHtml(match) +
        '</a>';
        lastIndex = offset + match.length;
        return match;
      });
      html += escapeHtml(raw.slice(lastIndex));
      return html || escapeHtml(raw);
    }

    function deliveryItemsHtml(items) {
      if (!items || !items.length) {

        '<div>' +

    function updateDepositVerifyProgress(percent, message) {
      const safePercent = Math.max(5, Math.min(92, Math.floor(percent || 0)));
      const fill = byId("verifyProgressFill");
      const pct = byId("verifyProgressPct");
      const text = byId("verifyProgressText");
      if (fill) fill.style.width = safePercent + "%";
      if (pct) pct.textContent = safePercent + "%";
      if (text && message) text.textContent = message;
    }

    function startDepositVerifyProgress(method) {
      clearInterval(depositVerifyTimer);
      depositVerifyPercent = 8;
      const methodLabel = method?.label || "Payment";
      const messages = [
        "Checking payment details...",
        "Reading reference...",
        "Matching amount...",
        "Confirming wallet update...",
        "Almost done..."
      ];
      openSheet(depositVerifySheetHtml(methodLabel, depositVerifyPercent, messages[0]));
      let step = 0;
      depositVerifyTimer = setInterval(() => {
        step += 1;
        depositVerifyPercent = Math.min(88, depositVerifyPercent + (step < 3 ? 14 : 7));
        updateDepositVerifyProgress(depositVerifyPercent, messages[Math.min(messages.length - 1, step)]);
      }, 760);
    }

    function stopDepositVerifyProgress() {
      clearInterval(depositVerifyTimer);
      depositVerifyTimer = 0;

      openSheet(
        '<div class="sheet-title"><span>Language</span><button class="icon-btn" type="button" data-action="closeSheet">' + customEmoji("close", "x", "solo") + '</button></div>' +
        '<div class="deposit-methods">' +
          options.map((option) => {
            const code = String(option.code || "en").toLowerCase();
            return settingsOptionButton(option.label || code.toUpperCase(), "saveLanguage", "language", code, code === selected);
          }).join("") +
        '</div>'
      );
    }

    function showCurrencySettingsSheet() {
      const selected = String(state.user.currencyCode || state.settings.selectedCurrency || "USD").toUpperCase();
      const options = state.settings.currencyOptions?.length
        ? state.settings.currencyOptions
        : [{ code: "USD", label: "USD - US Dollar (United States)" }];
      openSheet(
        '<div class="sheet-title"><span>Currency</span><button class="icon-btn" type="button" data-action="closeSheet">' + customEmoji("close", "x", "solo") + '</button></div>' +
        '<div class="deposit-methods">' +
          options.map((option) => {
            const code = String(option.code || "USD").toUpperCase();
            return settingsOptionButton(option.label || code, "saveCurrency", "currency", code, code === selected);
          }).join("") +
        '</div>'
      );
    }

    async function saveLanguageSetting(language) {
      if (!language || state.busy) return;
      state.busy = true;
      try {
        const payload = await postAction("/api/settings/language", { language });
        applyStatePayload(payload);
        closeSheet();
        render();
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showToast(payload.message || "Language saved.");
      } catch (error) {
        tg?.HapticFeedback?.notificationOccurred?.("error");
        showToast(displayErrorMessage(error), true);
      } finally {
        state.busy = false;
      }
    }

    async function saveCurrencySetting(currency) {
      if (!currency || state.busy) return;
      state.busy = true;
      try {
        const payload = await postAction("/api/settings/currency", { currency });
        applyStatePayload(payload);
        closeSheet();
        render();
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showToast(payload.message || "Currency saved.");
      } catch (error) {
        tg?.HapticFeedback?.notificationOccurred?.("error");
        showToast(displayErrorMessage(error), true);
      } finally {
        state.busy = false;
      }
    }

    function openSheet(html) {
      byId("sheet").innerHTML = '<div class="sheet-handle"></div>' + html;
      byId("sheetBackdrop").classList.add("active");
    }

    function closeSheet() {
      byId("sheetBackdrop").classList.remove("active");
      state.checkout = null;
    }

    async function buyProduct() {
      const product = state.product;
      if (!product || state.busy) return;
      syncProductQtyInput();
      showCouponPromptSheet();
    }

    async function submitDeposit() {
      const method = methodById(state.depositMethod);
      const reference = byId("depositRef")?.value?.trim() || "";
      const amount = byId("depositAmount")?.value?.trim() || "";
      const button = document.querySelector('[data-action="submitDeposit"]');
      if (!method) {
        showToast("Select a payment method first.", true);
        return;
      }
      if (!reference) {
        showToast("Paste the transaction ID or hash first.", true);
        return;
      }
      if (method.id === "upi" && !amount) {
        showToast("Enter the INR amount you sent.", true);
        return;
      }
      try {
        if (button) {
          button.disabled = true;
          button.textContent = "Verifying...";
        }
        startDepositVerifyProgress(method);
        const payload = await postAction("/api/deposit/verify", { method: method.id, reference, amount });
        stopDepositVerifyProgress();
        state.user.balanceUsdt = payload.balanceUsdt || state.user.balanceUsdt;
        state.stats.totalDepositedUsdt = payload.totalDepositedUsdt || state.stats.totalDepositedUsdt;
        state.deposits = payload.deposits || state.deposits;
        state.transactions = payload.transactions || state.transactions;
        state.stats.depositsCount = state.deposits.length;
        state.stats.transactionsCount = state.transactions.length;
        closeSheet();
        render();
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showToast(payload.message || "Deposit credited.");
      } catch (error) {
        stopDepositVerifyProgress();
        tg?.HapticFeedback?.notificationOccurred?.("error");
        const message = displayErrorMessage(error);
        showActionErrorSheet("Deposit Verification Failed", message);
        showToast(message, true);
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = "Submit deposit";
        }
      }
    }

    async function uploadReviewProof(depositId) {
      const id = Number(depositId || 0);
      const fileInput = byId("reviewProofFile");
      const file = fileInput?.files?.[0];
      const button = document.querySelector('[data-action="uploadReviewProof"]');
      if (!Number.isFinite(id) || id <= 0) {
        showToast("Deposit not found.", true);
        return;
      }
      if (!file) {
        showToast("Attach a screenshot or video first.", true);
        return;
      }
      if (file.size > 20 * 1024 * 1024) {
        showToast("Upload a file under 20 MB.", true);
        return;
      }
      const type = String(file.type || "").toLowerCase();
      if (!type.startsWith("image/") && !type.startsWith("video/")) {
        showToast("Upload a photo or video proof only.", true);
        return;
      }
      try {
        if (button) {
          button.disabled = true;
          button.textContent = "Uploading...";
        }
        const form = new FormData();
        form.append("depositId", String(id));
        form.append("file", file);
        const response = await fetch(API_BASE + "/api/deposit/review-upload", {
          method: "POST",
          headers: authHeader(),
          body: form,
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "Upload failed.");
        }
        applyStatePayload(payload);
        closeSheet();
        render();
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showToast(payload.message || "Proof uploaded.");
      } catch (error) {
        tg?.HapticFeedback?.notificationOccurred?.("error");
        showToast(displayErrorMessage(error), true);
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = "Upload screenshot / video";
        }
      }
    }

    async function copyText(value) {
      try {
        await navigator.clipboard.writeText(value);
        tg?.HapticFeedback?.notificationOccurred?.("success");
        showToast("Copied.");
      } catch {
        showToast("Copy failed. Long-press the address to copy.", true);
      }
    }

    function orderById(orderId) {
      return state.orders.find((item) => Number(item.id) === Number(orderId));
    }

    function orderTextPayload(order) {
      const items = Array.isArray(order.items) ? order.items.filter(Boolean) : [];
      return [
        "Order #: " + rawOrderRefClient(order),
        "Product: " + (order.productName || "Order"),
        "Status: " + (order.statusLabel || prettyOrderStatus(order.status)),
        "Quantity: " + String(order.quantity || 1),
        "Total paid: " + currencyMoney(order.amountUsdt),
        "Placed: " + formatDate(order.createdAt),
        order.deliveredAt ? "Delivered: " + formatDate(order.deliveredAt) : "",
        "",
        "Items:",
        items.length ? items.join("\n") : orderStatusNote(order),
      ].filter((line, index, arr) => line || arr[index - 1] !== "").join("\n");
    }

    function csvCell(value) {
      const raw = String(value ?? "");
      return /[",\n\r]/.test(raw) ? '"' + raw.replaceAll('"', '""') + '"' : raw;
    }

    function orderCsvPayload(order) {
      const rows = [
        ["Field", "Value"],
        ["Order #", rawOrderRefClient(order)],
        ["Product", order.productName || "Order"],
        ["Status", order.statusLabel || prettyOrderStatus(order.status)],
        ["Quantity", String(order.quantity || 1)],
        ["Total paid", currencyMoney(order.amountUsdt)],
        ["Placed", formatDate(order.createdAt)],
      ];
      if (order.deliveredAt) rows.push(["Delivered", formatDate(order.deliveredAt)]);
      rows.push([]);
      rows.push(["Item #", "Value"]);
      const items = Array.isArray(order.items) ? order.items.filter(Boolean) : [];
      if (items.length) {
        items.forEach((item, index) => rows.push([String(index + 1), item]));
      } else {
        rows.push(["-", orderStatusNote(order)]);
      }
      return rows.map((row) => row.map(csvCell).join(",")).join("\n");
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    function openSupport() {
      const user = state.bot.supportUsername || "anubhav_seller_bot";
      tg?.openTelegramLink?.("https://t.me/" + user);
    }

    function openBot() {
      const bot = state.bot.username || "Loguetown_bot";
      tg?.openTelegramLink?.("https://t.me/" + bot);
    }

    document.addEventListener("click", (event) => {
      const clicked = event.target instanceof Element ? event.target : event.target?.parentElement;
      if (!clicked) return;
      const openUrl = clicked.closest("[data-open-url]");
      if (openUrl) {
        event.preventDefault();
        const url = openUrl.dataset.openUrl || openUrl.getAttribute("href") || "";
        if (url) {
          tg?.openLink?.(url, { try_instant_view: false });
          if (!tg?.openLink) window.open(url, "_blank", "noopener,noreferrer");
        }
        return;
      }

      const productCard = clicked.closest("[data-product-id]");
      if (productCard) {
        const product = state.products.find((item) => item.id === Number(productCard.dataset.productId));
        if (product) setTab("product", { product });
        return;
      }

      const orderCard = clicked.closest(".order-click[data-order-id]");
      if (orderCard) {
        const order = state.orders.find((item) => item.id === Number(orderCard.dataset.orderId));
        if (order) showOrderDetailsSheet(order);
        return;
      }

      const depositCard = clicked.closest(".order-click[data-deposit-id]");
      if (depositCard) {
        const deposit = state.deposits.find((item) => item.id === Number(depositCard.dataset.depositId));
        if (deposit) showDepositDetailsSheet(deposit);
        return;
      }

      const target = clicked.closest("[data-action], [data-tab]");
      if (!target) return;

      const action = target.dataset.action;
      if (target.dataset.tab) setTab(target.dataset.tab);
      if (action === "tab") setTab(target.dataset.tab || "shop");
      if (action === "toggleOrder") {
        const id = Number(target.dataset.orderId || 0);
        state.expandedOrderId = state.expandedOrderId === id ? 0 : id;
        renderOrders();
      }
      if (action === "copyOrderItems") {
        const order = orderById(target.dataset.orderId);
        if (order) copyText(orderTextPayload(order));
      }
      if (action === "downloadOrderTxt") {
        const order = orderById(target.dataset.orderId);
        if (order) {
          downloadFile(rawOrderRefClient(order) + "-delivery.txt", orderTextPayload(order), "text/plain;charset=utf-8");
          showToast("TXT download started.");
        }
      }
      if (action === "downloadOrderCsv") {
        const order = orderById(target.dataset.orderId);
        if (order) {
          downloadFile(rawOrderRefClient(order) + "-delivery.csv", orderCsvPayload(order), "text/csv;charset=utf-8");
          showToast("CSV download started.");
        }
      }
      if (action === "deposit") showDepositSheet();
      if (action === "selectDepositMethod") showDepositSheet(target.dataset.method);
      if (action === "copyDepositValue") copyText(target.dataset.copy || "");
      if (action === "submitDeposit") submitDeposit();
      if (action === "uploadReviewProof") uploadReviewProof(target.dataset.depositId);
      if (action === "closeSheet") closeSheet();
      if (action === "buy") buyProduct();
      if (action === "enterCoupon") showCouponEntrySheet(target.dataset.coupon || "");
      if (action === "continueNoCoupon") showCheckoutSheet("");
      if (action === "applyCouponFromPrompt") showCheckoutSheet(byId("couponCodeInput")?.value?.trim() || "");
      if (action === "changeCoupon") showCouponEntrySheet(target.dataset.coupon || "");
      if (action === "payWallet") payWalletFromSheet(target.dataset.coupon || "");
      if (action === "startOrderPayment") startOrderPaymentFromSheet(target.dataset.method || "", target.dataset.coupon || "");
      if (action === "verifyOrderPayment") verifyOrderPaymentFromSheet(target);
      if (action === "support") openSupport();
      if (action === "openBot") openBot();
      if (action === "transactions") showTransactionsSheet();
      if (action === "wallet") setTab("wallet");
      if (action === "orders") setTab("orders");
      if (action === "languageSettings") showLanguageSettingsSheet();
      if (action === "currencySettings") showCurrencySettingsSheet();
      if (action === "saveLanguage") saveLanguageSetting(target.dataset.language || "");
      if (action === "saveCurrency") saveCurrencySetting(target.dataset.currency || "");
      if (action === "qtyInc" && state.product) {
        const product = state.product;
        state.qty.set(product.id, Math.min(product.maxQty, qtyFor(product) + 1));
        renderProduct();
      }
      if (action === "qtyDec" && state.product) {
        const product = state.product;
        state.qty.set(product.id, Math.max(product.minQty, qtyFor(product) - 1));
        renderProduct();
      }
    });

    document.addEventListener("input", (event) => {
      const orderSearch = event.target.closest('[data-action="orderSearch"]');
      if (orderSearch) {
        state.orderSearch = orderSearch.value || "";
        applyOrderSearchFilter();
        return;
      }
      const depositSearch = event.target.closest('[data-action="depositSearch"]');
      if (depositSearch) {
        state.depositSearch = depositSearch.value || "";
        applyDepositSearchFilter();
        return;
      }
      const target = event.target.closest('[data-action="qtyInput"]');
      const product = state.product;
      if (!target || !product) return;
      const parsed = Math.floor(Number(target.value));
      if (Number.isFinite(parsed) && parsed >= product.minQty && parsed <= product.maxQty) {
        state.qty.set(product.id, parsed);
        updateBuyButton(product);
      }
    });

    document.addEventListener("change", (event) => {
      const target = event.target.closest('[data-action="qtyInput"]');
      if (!target || !state.product) return;
      syncProductQtyInput();
      renderProduct();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const target = event.target instanceof Element ? event.target.closest("[data-product-id]") : null;
      if (!target) return;
      event.preventDefault();
      const product = state.products.find((item) => item.id === Number(target.dataset.productId));
      if (product) setTab("product", { product });
    });

    byId("sheetBackdrop").addEventListener("click", (event) => {
      if (event.target === byId("sheetBackdrop")) closeSheet();
    });

    byId("refreshBtn").addEventListener("click", () => {
      state.ready = false;
      loadShop().catch((error) => {
        state.ready = true;
        byId("shop").innerHTML = emptyHtml("Could not load mini app. Tap refresh to retry.");
        setNotice(displayErrorMessage(error), true);
        showAppShell();
      });
    });

    byId("backBtn").addEventListener("click", () => {
      if (state.tab === "product") {
        setTab(state.previousTab || "shop");
      } else if (state.tab === "wallet") {
        setTab("me");
      } else if (state.tab !== "shop") {
        setTab("shop");
      }
    });

    document.addEventListener("contextmenu", (event) => {
      if (event.target instanceof Element && event.target.closest("img")) {
        event.preventDefault();
      }
    });

    document.addEventListener("dragstart", (event) => {
      if (event.target instanceof Element && event.target.closest("img")) {
        event.preventDefault();
      }
    });

    setInterval(() => {
      if (state.tab === "wallet" || liveDepositCount() > 0) {
        refreshLiveState();
      }
    }, 9000);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) refreshLiveState();
    });

    setTab("shop");
    loadShop().catch((error) => {
      state.ready = true;
      byId("shop").innerHTML = emptyHtml("Could not load mini app. Tap refresh to retry.");
      setNotice(displayErrorMessage(error), true);
      showAppShell();
    });
  </script>
</body>
</html>
