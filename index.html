<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Loguetown Shoppie</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: var(--tg-theme-bg-color, #12171b);
      --surface: var(--tg-theme-secondary-bg-color, #232b31);
      --panel: #1b2533;
      --panel2: #2b363e;
      --text: var(--tg-theme-text-color, #f8fbff);
      --muted: var(--tg-theme-hint-color, #9aa7b2);
      --line: rgba(160, 174, 188, .18);
      --accent: #dc7470;
      --accent2: #15ad79;
      --warn: #e3a324;
      --danger: #ff656a;
      --ok: #25c982;
      --shadow: 0 18px 44px rgba(0, 0, 0, .22);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow-x: hidden;
      width: 100vw;
      padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 86px);
    }

    body.app-booting .app,
    body.app-booting .bottom-nav,
    body.app-booting .sheet-backdrop,
    body.app-booting .toast {
      visibility: hidden;
      pointer-events: none;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(18, 23, 27, .96), rgba(26, 34, 40, .98)),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, .03) 0 1px, transparent 1px 16px);
    }

    body:not(.app-booting) .app-loader {
      display: none;
    }

    .loader-card {
      width: min(280px, 84vw);
      display: grid;
      justify-items: center;
      gap: 16px;
    }

    .loader-mark {
      width: 82px;
      height: 82px;
      border-radius: 20px;
      position: relative;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #1f2c35, #2f3944);
      border: 1px solid rgba(255, 255, 255, .13);
      box-shadow: 0 18px 42px rgba(0, 0, 0, .28);
      animation: loaderFloat 1.9s ease-in-out infinite;
    }

    .loader-mark::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 23px;
      background: conic-gradient(from 0deg, #ff747b, #f0b247, #25c982, #8bc4ff, #ff747b);
      opacity: .92;
      z-index: -1;
      animation: loaderSpin 2.4s linear infinite;
    }

    .loader-mark::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .loader-logo {
      font-size: 28px;
      line-height: 1;
      font-weight: 1000;
      letter-spacing: 0;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0, 0, 0, .42);
    }

    .loader-title {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 900;
      text-align: center;
    }

    .loader-subtitle {
      margin-top: -8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .loader-track {
      width: min(260px, 78vw);
      height: 9px;
      border-radius: 999px;
      background: #172029;
      border: 1px solid rgba(255, 255, 255, .08);
      overflow: hidden;
      box-shadow: inset 0 1px 4px rgba(0, 0, 0, .28);
    }

    .loader-track::before {
      content: "";
      display: block;
      width: 46%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff747b, #f0b247, #25c982);
      animation: loaderSlide 1.22s ease-in-out infinite;
    }

    .loader-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .loader-dots span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .42);
      animation: loaderPulse .9s ease-in-out infinite;
    }

    .loader-dots span:nth-child(2) {
      animation-delay: .12s;
    }

    .loader-dots span:nth-child(3) {
      animation-delay: .24s;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: var(--text);
      font-weight: 800;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      opacity: .48;
      cursor: default;
    }

    img {
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .app {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .appbar {
      height: 48px;
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      margin: 0 -12px 14px;
      padding: 0 12px;
      position: sticky;
      top: 0;
      z-index: 8;
      background: rgba(18, 23, 27, .95);
      backdrop-filter: blur(10px);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: transparent;
      display: grid;
      place-items: center;
      font-size: 20px;
      color: #ff777d;
      transition: background .14s, transform .14s, box-shadow .14s;
    }

    .mini-emoji {
      width: 1.28em;
      height: 1.28em;
      object-fit: contain;
      display: inline-block;
      vertical-align: -.24em;
      margin-right: 5px;
      pointer-events: none;
    }

    .mini-emoji.solo {
      margin-right: 0;
    }

    .nav-icon .mini-emoji {
      width: 24px;
      height: 24px;
      margin: 0;
      vertical-align: middle;
    }

    .product-media .mini-emoji,
    .detail-media .mini-emoji {
      width: 60%;
      height: 60%;
      margin: 0;
      vertical-align: middle;
    }

    .title {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-icon,
    .avatar,
    .product-fallback {
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #313d46;
      color: #fff;
      font-weight: 900;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, .75);
    }

    .brand-icon img,
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .screen {
      display: none;
      animation: fade .16s ease-out;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: .72; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      background: linear-gradient(135deg, #c36f8e 0%, #7d37e3 100%);
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      padding: 22px 20px 18px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .hero .brand-icon {
      width: 54px;
      height: 54px;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, .92);
      color: #14191f;
      font-size: 24px;
    }

    .eyebrow {
      font-size: 12px;
      line-height: 1.2;
      color: rgba(255, 255, 255, .82);
      margin: 0 0 7px;
    }

    .hero-name {
      margin: 0 0 22px;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .hero-balance {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .hero-balance strong {
      font-size: 31px;
      line-height: 1;
      letter-spacing: 0;
    }

    .hero-balance span {
      font-size: 14px;
      font-weight: 900;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin: 18px 4px 10px;
    }

    .hero .label {
      color: rgba(255, 255, 255, .78);
      margin: 0 0 16px;
    }

    .hero-actions,
    .two-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      min-height: 42px;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
      user-select: none;
      transition: background .14s, border-color .14s, transform .14s, box-shadow .14s, opacity .14s;
    }

    .btn.secondary {
      background: #303b44;
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .btn.ghost {
      background: rgba(255, 255, 255, .13);
      border: 1px solid rgba(255, 255, 255, .24);
    }

    .btn.full {
      width: 100%;
    }

    .search {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(152, 169, 184, .28);
      border-radius: 8px;
      background: #2c3740;
      color: var(--text);
      outline: none;
      padding: 0 14px;
      margin-bottom: 14px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      min-height: 30px;
      border-radius: 8px;
      padding: 0 12px;
      background: #313b44;
      color: var(--muted);
      font-size: 13px;
      transition: background .14s, transform .14s, box-shadow .14s;
    }

    .chip.active {
      background: var(--accent);
      color: #fff;
    }

    .product-list,
    .stack {
      display: grid;
      gap: 10px;
    }

    .product-card,
    .order-card,
    .metric-card,
    .list-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      overflow: hidden;
    }

    .product-card {
      min-height: 110px;
      padding: 12px;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: border-color .14s, background .14s, transform .14s, box-shadow .14s;
    }

    .product-card > div:last-child {
      min-width: 0;
    }

    .product-card:active {
      transform: scale(.995);
    }

    .product-card:hover {
      border-color: rgba(139, 196, 255, .34);
      background: #202c3b;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .035);
    }

    .product-card:focus-visible {
      outline: 2px solid rgba(139, 196, 255, .8);
      outline-offset: 2px;
    }

    .product-card .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .product-open {
      width: 22px;
      height: 42px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .product-media {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: #2f3d45;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-size: 29px;
    }

    .product-media img,
    .detail-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-name {
      margin: 0 0 5px;
      font-size: 15px;
      line-height: 1.22;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .product-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin: 0 0 9px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      overflow-wrap: anywhere;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .price {
      color: #ff747b;
      font-weight: 900;
      font-size: 16px;
      white-space: nowrap;
    }

    .reseller-chip {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: 999px;
      border: 1px solid rgba(46, 230, 166, .32);
      background: rgba(46, 230, 166, .12);
      color: #2ee6a6;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .stock {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      text-align: right;
    }

    .wallet-panel {
      background: #0eaa76;
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 16px;
      padding: 22px 20px;
      margin-bottom: 20px;
      box-shadow: 0 18px 40px rgba(10, 170, 118, .18);
    }

    .wallet-panel .label {
      color: rgba(255, 255, 255, .78);
      margin: 0 0 8px;
    }

    .wallet-amount {
      font-size: 32px;
      line-height: 1;
      font-weight: 900;
      margin-bottom: 13px;
    }

    .wallet-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, .84);
    }

    .wallet-actions {
      display: grid;
      gap: 8px;
      margin-bottom: 20px;
    }

    .wallet-live {
      border: 1px solid rgba(242, 207, 74, .32);
      background: rgba(242, 207, 74, .09);
      border-radius: 8px;
      padding: 10px 12px;
      margin: -8px 0 18px;
      color: #f2cf4a;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.35;
    }

    .order-card,
    .list-card {
      padding: 12px 14px;
    }

    .order-click {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      user-select: none;
      transition: border-color .14s, background .14s, transform .14s, box-shadow .14s;
    }

    .order-click:active {
      transform: scale(.995);
    }

    .order-click:focus-visible {
      outline: 2px solid rgba(139, 196, 255, .8);
      outline-offset: 2px;
    }

    .order-card .row {
      align-items: flex-start;
    }

    .order-card .row + .row {
      align-items: center;
    }

    .order-status-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .order-open {
      color: var(--muted);
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      transition: color .14s, transform .14s;
    }

    .orders-head {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .orders-head h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .order-search-wrap {
      min-height: 42px;
      border: 1px solid rgba(139, 196, 255, .22);
      background: rgba(11, 13, 30, .62);
      border-radius: 8px;
      padding: 0 12px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 9px;
      color: var(--muted);
    }

    .order-search-wrap input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-weight: 750;
    }

    .order-search-wrap input::placeholder {
      color: #b9c4d0;
    }

    .order-history-list {
      gap: 10px;
    }

    .order-history-card {
      border: 1px solid rgba(111, 98, 255, .34);
      background: linear-gradient(180deg, rgba(31, 27, 72, .94), rgba(21, 20, 55, .96));
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04), 0 10px 24px rgba(0, 0, 0, .18);
    }

    .order-history-card[hidden] {
      display: none;
    }

    .order-summary-btn {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: start;
      padding: 13px 14px;
      text-align: left;
    }

    .order-summary-main {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .order-summary-title {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      font-size: 15px;
      font-weight: 950;
      line-height: 1.15;
    }

    .order-summary-title span:first-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .order-ref-pill {
      flex: 0 0 auto;
      max-width: 112px;
      border-radius: 6px;
      padding: 2px 5px;
      background: rgba(242, 207, 74, .16);
      color: #f2cf4a;
      font-size: 9px;
      line-height: 1.1;
      font-weight: 950;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .order-summary-sub {
      color: #c8d2de;
      font-size: 12px;
      font-weight: 750;
      line-height: 1.35;
    }

    .order-summary-price {
      min-width: 66px;
      text-align: right;
      display: grid;
      gap: 3px;
      justify-items: end;
      font-weight: 950;
      line-height: 1.1;
    }

    .order-summary-price .status {
      text-transform: none;
      font-size: 10px;
      padding: 0;
      background: transparent;
      color: #47e99b;
    }

    .order-chev {
      padding-top: 4px;
      color: #aeb8c5;
      font-size: 16px;
      line-height: 1;
    }

    .order-expanded {
      border-top: 1px solid rgba(139, 196, 255, .14);
      display: grid;
      gap: 13px;
      padding: 13px 14px 15px;
      background: rgba(13, 13, 37, .26);
    }

    .order-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px 16px;
    }

    .order-detail-field {
      min-width: 0;
      display: grid;
      gap: 3px;
      font-size: 12px;
      line-height: 1.35;
    }

    .order-detail-field strong {
      color: #c7d1dc;
      font-weight: 850;
    }

    .order-detail-field span {
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .order-item-count {
      color: #dfe8f4;
      font-size: 13px;
      font-weight: 850;
    }

    .order-export-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-items: center;
    }

    .order-export-btn {
      min-height: 38px;
      border-radius: 8px;
      background: transparent;
      color: #f8fbff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 950;
    }

    .order-export-btn.active,
    .order-export-btn:active {
      background: rgba(95, 81, 214, .62);
    }

    .order-code-preview {
      margin: 0;
      max-height: 160px;
      overflow: auto;
      border-radius: 8px;
      background: rgba(5, 7, 21, .72);
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font: 800 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #fff;
    }

    .order-instructions {
      border: 1px solid rgba(111, 98, 255, .46);
      border-radius: 8px;
      padding: 13px 14px;
      display: grid;
      gap: 12px;
      background: rgba(25, 24, 73, .55);
    }

    .order-instructions-title {
      color: #6f62ff;
      font-size: 14px;
      font-weight: 950;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .order-instruction-box {
      border-radius: 8px;
      background: rgba(43, 39, 106, .46);
      padding: 12px;
      display: grid;
      gap: 9px;
    }

    .order-instruction-step {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 8px;
      align-items: start;
      font-size: 13px;
      line-height: 1.38;
      font-weight: 850;
    }

    .order-instruction-step b {
      width: 14px;
      height: 14px;
      border-radius: 5px;
      display: grid;
      place-items: center;
      background: rgba(0, 153, 255, .18);
      color: #42b9ff;
      font-size: 9px;
      line-height: 1;
      margin-top: 2px;
    }

    .order-title {
      font-weight: 900;
      line-height: 1.22;
      margin-bottom: 5px;
      overflow-wrap: anywhere;
    }

    .order-meta,
    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .status {
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 900;
      color: #fff;
      background: #34414a;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status.delivered,
    .status.credited,
    .status.completed {
      background: #0c8d60;
    }

    .status.cancelled,
    .status.failed,
    .status.rejected {
      background: #b86d22;
    }

    .status.pending_review,

    }

    .status.open {

    }

    .amount-state.credit {

    }

    .amount-state.debit {
      color: var(--danger);
    }

    .amount-state.rejected {

    }

    .amount-state.pending {
      color: #f2cf4a;
    }

    .amount-state.neutral {

    }

    .deposit-progress {

      gap: 7px;
      margin-top: 10px;
    }

    .deposit-progress-track,
    .verify-progress-track {
      height: 8px;

      overflow: hidden;
      background: #101820;
      border: 1px solid rgba(255, 255, 255, .08);

    .deposit-progress-fill,

      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .24) 0 22%, transparent 22% 44%, rgba(255, 255, 255, .16) 44% 66%, transparent 66%),
        linear-gradient(90deg, #f2cf4a, #25c982);
      background-size: 34px 100%, 100% 100%;
      animation: progressStripe .75s linear infinite;
      transition: width .22s ease;
    }

    .deposit-progress-meta,
    .verify-progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.35;
    }

    .verify-card {
      border: 1px solid rgba(139, 196, 255, .24);
      background: #1b2533;
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 13px;
    }

    .verify-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
    }

    .verify-orbit {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid rgba(139, 196, 255, .22);
      border-top-color: #8bc4ff;
      animation: loaderSpin .85s linear infinite;
      flex: 0 0 auto;
    }

    .review-upload {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .file-input {
      width: 100%;
      border: 1px dashed rgba(139, 196, 255, .34);
      border-radius: 8px;
      background: #1b2533;
      color: var(--muted);
      padding: 12px;
      font-size: 12px;
      font-weight: 800;
    }

    .transaction-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 14px;
      padding: 12px 14px;
      display: grid;
      gap: 4px;
    }

    .transaction-card .row {
      align-items: start;
    }

    .tx-amount {
      font-size: 15px;
      line-height: 1.2;
      font-weight: 900;
      white-space: nowrap;
    }

    .tx-amount.credit {
      color: var(--ok);
    }

    .tx-amount.debit {
      color: var(--danger);
    }

    .tx-amount.neutral {
      color: var(--muted);
    }

    .profile {
      display: grid;
      gap: 12px;
      padding: 4px 0 10px;
    }

    .profile-head {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .profile-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .profile-name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      background: #11171d;
      border: 1px solid var(--line);
      font-size: 22px;
      flex: 0 0 auto;
    }

    .profile-name {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .role-badges {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .role-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 8px;
      border: 1px solid rgba(149, 163, 178, .34);
      background: rgba(149, 163, 178, .1);
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow: hidden;
      isolation: isolate;
      animation: none;
    }

    .role-badge::after {
      content: "";
      position: absolute;
      inset: -45% -75%;
      background: linear-gradient(115deg, transparent 28%, rgba(255, 255, 255, .58) 50%, transparent 72%);
      transform: translateX(-130%);
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    .role-badge.reseller {
      color: #09251e;
      border-color: rgba(46, 230, 166, .72);
      background: linear-gradient(135deg, #2ee6a6, #d9f99d);
      box-shadow: 0 0 0 rgba(46, 230, 166, 0);
      animation: resellerBadge 2.2s ease-in-out infinite;
    }

    .role-badge.reseller::after {
      opacity: .7;
      animation: badgeSweep 2.4s ease-in-out infinite;
    }

    .role-badge.owner {
      color: #3a2600;
      border-color: rgba(255, 215, 106, .58);
      background: linear-gradient(135deg, #ffd76a, #ffad4d);
      box-shadow: 0 0 0 rgba(255, 215, 106, 0);
      animation: ownerBadge 2.5s ease-in-out infinite;
    }

    .role-badge.owner::after {
      opacity: .38;
      animation: badgeSweep 3s ease-in-out infinite;
    }

    .role-badge.admin {
      color: #d8fff5;
      border-color: rgba(46, 230, 166, .44);
      background: rgba(46, 230, 166, .13);
      box-shadow: 0 0 0 rgba(46, 230, 166, 0);
      animation: adminBadge 2.8s ease-in-out infinite;
    }

    .role-badge.admin::after {
      opacity: .26;
      animation: badgeSweep 3.2s ease-in-out infinite;
    }

    .role-badge.user {
      animation: none;
    }

    @keyframes resellerBadge {
      0%, 100% {
        transform: translateY(0);
        box-shadow: 0 0 0 rgba(46, 230, 166, 0);
      }
      50% {
        transform: translateY(-1px);
        box-shadow: 0 0 18px rgba(46, 230, 166, .34);
      }
    }

    @keyframes ownerBadge {
      0%, 100% {
        transform: translateY(0);
        box-shadow: 0 0 0 rgba(255, 215, 106, 0);
      }
      50% {
        transform: translateY(-1px);
        box-shadow: 0 0 15px rgba(255, 215, 106, .26);
      }
    }

    @keyframes adminBadge {
      0%, 100% {
        transform: translateY(0);
        box-shadow: 0 0 0 rgba(46, 230, 166, 0);
      }
      50% {
        transform: translateY(-1px);
        box-shadow: 0 0 13px rgba(46, 230, 166, .2);
      }
    }

    @keyframes badgeSweep {
      0%, 40% {
        transform: translateX(-130%);
      }
      72%, 100% {
        transform: translateX(130%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .role-badge,
      .role-badge::after {
        animation: none;
      }
    }

    .action-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: var(--panel);
    }

    .action-item {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      gap: 12px;
      text-align: left;
      transition: background .14s, transform .14s, box-shadow .14s;
    }

    .action-item:last-child {
      border-bottom: 0;
    }

    .action-item strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .action-item span {
      color: var(--muted);
      transition: color .14s, transform .14s;
    }

    .action-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .session-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .action-meta-value {
      min-width: 22px;
      text-align: right;
      color: #8bc4ff;
      font-weight: 900;
    }

    .metric-card {
      display: grid;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: var(--panel);
      margin-top: 4px;
    }

    .metric-row {
      min-height: 48px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      gap: 10px;
    }

    .metric-row:last-child {
      border-bottom: 0;
    }

    .metric-row strong,
    .metric-row span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .metric-row span {
      color: var(--muted);
      text-align: right;
    }

    .delivery-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .delivery-title {
      font-size: 20px;
      line-height: 1.15;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .order-detail-note {
      margin-top: 10px;
    }

    .delivery-steps {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .delivery-step,
    .delivery-summary-row {
      display: grid;
      grid-template-columns: minmax(92px, auto) minmax(0, 1fr);
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }

    .delivery-step:last-child,
    .delivery-summary-row:last-child {
      border-bottom: 0;
    }

    .delivery-step span,
    .delivery-summary-row span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .delivery-summary {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .delivery-items {
      display: grid;
      gap: 10px;
      max-height: 260px;
      overflow: auto;
    }

    .delivery-item-index {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin: 0 0 4px;
    }

    .delivery-item {
      margin: 0;
      border-left: 3px solid #f0b247;
      border-radius: 6px;
      background: rgba(240, 178, 71, .14);
      padding: 10px 11px;
      color: #ffd18b;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      font: inherit;
      line-height: 1.35;
    }

    .delivery-item a {
      color: #8bc4ff;
      text-decoration: underline;
      text-underline-offset: 2px;

    }

    .delivery-link {
      display: block;
      margin: 6px 0;
      border: 1px solid rgba(139, 196, 255, .34);
      border-radius: 8px;
      background: rgba(139, 196, 255, .10);
      padding: 10px 11px;
      color: #8bc4ff;
      text-decoration: none;
      word-break: break-all;
      transition: border-color .14s, background .14s, transform .14s, box-shadow .14s;
    }

    .delivery-link strong {
      display: block;
      color: #d7ecff;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .detail-media {
      height: 216px;
      border-radius: 8px;
      background: #303c45;
      display: grid;
      place-items: center;
      overflow: hidden;
      margin-bottom: 18px;
      font-size: 78px;
    }

    .detail-title {
      font-size: 22px;
      line-height: 1.18;
      font-weight: 900;
      margin: 0 0 14px;
      overflow-wrap: anywhere;
    }

    .detail-price {
      color: #ff747b;
      font-size: 30px;
      line-height: 1;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .detail-price-note {
      color: var(--muted);
      font-size: 12px;

      margin: -2px 0 10px;
    }

    .detail-box {
      border-radius: 8px;
      background: #303b44;
      padding: 14px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0 18px;
    }

    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel);
    }

    .mini-stat span {
      color: var(--muted);
      font-size: 11px;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 800;
    }

    .mini-stat strong {
      font-size: 14px;
      line-height: 1.2;

    }

    .qty {
      display: inline-grid;
      grid-template-columns: 42px minmax(76px, 104px) 42px;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;

    .qty button,
    .qty input {
      height: 42px;

      background: var(--panel);

      font-size: 18px;
      font-weight: 900;
    }

      border: 1px solid transparent;

    }

      width: 100%;
      border: 1px solid var(--line);

      text-align: center;
      outline: none;
      padding: 0 8px;

    .sticky-buy {
      position: sticky;
      bottom: calc(env(safe-area-inset-bottom) + 76px);

      margin-top: 18px;
      box-shadow: 0 -12px 28px rgba(18, 23, 27, .72);

    .empty,
    .notice {

      border-radius: 8px;

      background: var(--panel);
      color: var(--muted);
      line-height: 1.42;
    }

      color: var(--danger);
    }

    .bottom-nav {

      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9;
      padding: 7px 10px calc(env(safe-area-inset-bottom) + 8px);
      background: rgba(31, 38, 44, .97);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);

    .nav-inner {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }

    .nav-btn {

      border-radius: 8px;
      min-height: 52px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
      gap: 2px;
      font-weight: 800;
      transition: background .14s, color .14s, transform .14s;
    }

    .nav-btn .nav-icon {
      font-size: 22px;
      line-height: 1;
    }

    .nav-btn.active {
      color: #ff747b;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .54);
      z-index: 20;
      display: none;
      align-items: flex-end;

      padding: 12px;
    }

    .sheet-backdrop.active {
      display: flex;
    }

    .sheet {

      max-width: 420px;
      border-radius: 8px 8px 0 0;
      background: var(--surface);
      border: 1px solid var(--line);

      height: 4px;

      align-items: center;

      }

      display: flex;

      gap: 12px;

      gap: 7px;
      margin-bottom: 12px;

    .form-field span {

    .checkout-fields .form-field {

      min-height: 46px;

      padding: 0 12px;

    .checkout-field-input {

      background-size: 240% 100%;
      animation: shimmer 1.15s infinite linear;

    .chip:focus-visible,
    .icon-btn:focus-visible,

    .action-item:focus-visible,

    .qty button:focus-visible {

        border-color: rgba(139, 196, 255, .42);

        box-shadow: 0 10px 22px rgba(0, 0, 0, .14), inset 0 1px 0 rgba(255, 255, 255, .04);

      tab: "shop",
      previousTab: "shop",
      query: "",
      orderSearch: "",
      depositSearch: "",
      expandedOrderId: null,
      qty: new Map(),
      product: null,
      checkout: null,
      depositMethod: "binance_pay",
      bot: { name: "Loguetown Shoppie", username: "Loguetown_bot", supportUsername: "anubhav_seller_bot", logoUrl: "" },
      user: { id: "", username: "", balanceUsdt: "0", joinedAt: "", role: "user", roleLabel: "User", isReseller: false, roleTags: [{ role: "user", label: "User" }], language: "en", languageLabel: "English", currencyCode: "USD", currencyLabel: "USD - US Dollar (United States)", currencyRate: 1 },
      stats: { totalDepositedUsdt: "0", ordersCount: 0, depositsCount: 0, transactionsCount: 0 },
      settings: { languageOptions: [], currencyOptions: [], selectedLanguage: "en", selectedCurrency: "USD" },
      products: [],
      orders: [],
      deposits: [],
      transactions: [],
      depositMethods: [],
      disabledPaymentMethods: [],
      customEmojiIds: {},
      customEmojiUrls: {},
      customEmojiObjectUrls: {},
      liveRefreshInFlight: false,
    };
    let depositVerifyTimer = 0;
    let depositVerifyPercent = 0;

    function showAppShell() {
      document.body.classList.remove("app-booting");
      try {
        tg?.ready?.();
      } catch {}
    }

    function hideAppShell() {
      document.body.classList.add("app-booting");
    }

    const byId = (id) => document.getElementById(id);
    const authHeader = () => ({ "authorization": "tma " + (tg?.initData || "") });

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function money(value) {
      const num = Number(value || 0);
      if (!Number.isFinite(num)) return "0";
      return num.toLocaleString("en-US", { maximumFractionDigits: 3 });
    }

    function currentCurrencyCode() {
      return String(state.user.currencyCode || state.settings.selectedCurrency || "USD").toUpperCase();
    }

    function currentCurrencyRate() {
      const rate = Number(state.user.currencyRate || 1);
      return Number.isFinite(rate) && rate > 0 ? rate : 1;
    }

    function currencyAmount(valueUsdt) {
      return money(Number(valueUsdt || 0) * currentCurrencyRate());
    }

    function currencyMoney(valueUsdt) {
      return currencyAmount(valueUsdt) + " " + currentCurrencyCode();
    }

    function signedCurrencyMoney(valueUsdt, tone) {
      const value = Number(valueUsdt || 0);
      const prefix = tone === "credit" && value > 0 ? "+" : tone === "debit" && value > 0 ? "-" : "";
      return prefix + currencyMoney(Math.abs(value));
    }

    function initials(name) {
      const raw = String(name || "L").replace(/^@+/, "").trim();
      return (raw.slice(0, 1) || "L").toUpperCase();
    }

    function logoHtml() {
      const logo = state.bot.logoUrl || "";
      if (logo) return '<img src="' + escapeHtml(logo) + '" alt="" draggable="false" oncontextmenu="return false">';
      return "L";
    }

    function syncBrandLogo() {
      const icon = byId("brandIcon");
      if (icon) icon.innerHTML = logoHtml();
    }

    function methodById(id) {
      return state.depositMethods.find((method) => method.id === id) || state.depositMethods[0] || null;
    }

    function paymentMethodDisabled(id) {
      return (state.disabledPaymentMethods || []).includes(id);
    }

    function customEmojiAssetUrl(customEmojiId) {
      return API_BASE + "/api/custom-emoji/" + encodeURIComponent(String(customEmojiId || ""));
    }

    async function preloadCustomEmojis() {
      const entries = Object.entries(state.customEmojiIds || {});
      for (const product of state.products || []) {
        if (/^\d{8,32}$/.test(String(product.customEmojiId || ""))) {
          entries.push(["product:" + product.id, String(product.customEmojiId)]);
        }
      }
      await Promise.all(entries.map(async ([key, customEmojiId]) => {
        if (state.customEmojiObjectUrls[key] || !/^\d{8,32}$/.test(String(customEmojiId || ""))) return;
        try {
          const response = await fetch(customEmojiAssetUrl(customEmojiId), {
            headers: authHeader(),
            cache: "no-store",
          });
          if (!response.ok) return;
          const blob = await response.blob();
          state.customEmojiObjectUrls[key] = URL.createObjectURL(blob);
        } catch (error) {
          console.warn("custom emoji load failed", key, error);
        }
      }));
    }

    function customEmoji(key, fallback, extraClass = "") {
      const src = state.customEmojiObjectUrls?.[key] || "";
      const cleanFallback = String(fallback || "");
      if (!src) return escapeHtml(cleanFallback);
      const cls = ("mini-emoji " + extraClass).trim();
      return '<img class="' + escapeHtml(cls) + '" src="' + escapeHtml(src) + '" alt="' + escapeHtml(cleanFallback) + '" loading="lazy" draggable="false" oncontextmenu="return false" onerror="this.outerHTML=this.alt">';
    }

    function productEmojiKey(product) {
      const key = "product:" + (product?.id || "");
      return state.customEmojiObjectUrls?.[key] ? key : "product";
    }

    function renderNavIcons() {
      document.querySelectorAll("[data-emoji-key]").forEach((node) => {
        node.innerHTML = customEmoji(node.dataset.emojiKey, node.dataset.fallback || "", "solo");
      });
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("en-US", {
        month: "short",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function totalFor(product) {
      return Number(product?.price || 0) * qtyFor(product);
    }

    function qtyFor(product) {
      if (!product) return 1;
      if (!state.qty.has(product.id)) state.qty.set(product.id, product.minQty || 1);
      const current = state.qty.get(product.id);
      return Math.max(product.minQty || 1, Math.min(current, product.maxQty || current));
    }

    function clampQty(product, value) {
      const min = product?.minQty || 1;
      const max = product?.maxQty || min;
      const parsed = Math.floor(Number(value));
      if (!Number.isFinite(parsed)) return qtyFor(product);
      return Math.max(min, Math.min(parsed, max));
    }

    function updateBuyButton(product) {
      const button = document.querySelector('[data-action="buy"]');
      if (!button || !product || state.busy) return;
      button.innerHTML = customEmoji("buy", "cart") + "Checkout · " + currencyMoney(totalFor(product));
    }

    function syncProductQtyInput() {
      const product = state.product;
      const input = byId("qtyInput");
      if (!product || !input) return qtyFor(product);
      const qty = clampQty(product, input.value);
      state.qty.set(product.id, qty);
      input.value = String(qty);
      updateBuyButton(product);
      return qty;
    }

    function productMedia(product, detail = false) {
      const cls = detail ? "detail-media" : "product-media";
      if (product?.imageUrl) {
        return '<div class="' + cls + '"><img src="' + escapeHtml(product.imageUrl) + '" alt="" draggable="false" oncontextmenu="return false"></div>';
      }
      return '<div class="' + cls + '"><span>' + customEmoji(productEmojiKey(product), "📦", "solo") + '</span></div>';
    }

    function showToast(message, isError = false) {
      const toast = byId("toast");
      toast.textContent = message;
      toast.style.borderColor = isError ? "rgba(255, 101, 106, .45)" : "rgba(160, 174, 188, .18)";
      toast.classList.add("active");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("active"), 2600);
    }

    function setNotice(message, isError = false) {
      const notice = byId("notice");
      notice.textContent = message || "";
      notice.hidden = !message;
      notice.className = "notice" + (isError ? " error" : "");
    }

    function displayErrorMessage(error) {
      const message = error instanceof Error ? error.message : String(error || "Action failed.");
      if (/expired or revoked|invalid_grant|gmail token refresh|token.*expired|token.*revoked/i.test(message)) {
        return "UPI payment verification is temporarily unavailable. Please try again later.";
      }
      return message;
    }

    function pageTitle() {
      if (state.tab === "home") return state.bot.name || "Loguetown Shoppie";
      if (state.tab === "shop") return "Shop";
      if (state.tab === "orders") return "Orders";
      if (state.tab === "wallet") return "Deposit history";
      if (state.tab === "me") return "Account";
      return "Product";
    }

    function setTab(tab, options = {}) {
      if (tab === "product" && options.product) {
        state.product = options.product;
      }
      if (tab !== "product") {
        state.previousTab = tab;
      }
      state.tab = tab;
      byId("pageTitle").textContent = pageTitle();
      document.querySelectorAll(".screen").forEach((screen) => screen.classList.toggle("active", screen.id === tab));
      document.querySelectorAll(".nav-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tab));
      byId("backBtn").style.visibility = ["shop", "orders", "me"].includes(tab) ? "hidden" : "visible";
      render();
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function topLevelProducts() {
      return (state.products || []).filter((product) => !product.variantParentId);
    }

    function productVariants(product) {
      const parentId = Number(product?.id || 0);
      if (!parentId) return [];
      return (state.products || []).filter((item) => Number(item.variantParentId || 0) === parentId);
    }

    function variantPriceSummary(product) {
      const prices = productVariants(product)
        .map((item) => Number(item.price || item.priceUsdt || 0))
        .filter((value) => Number.isFinite(value) && value > 0);
      if (!prices.length) return "Variants";
      return "From " + currencyMoney(Math.min(...prices));
    }

    function productCard(product) {
      const variants = productVariants(product);
      const hasVariants = product.hasVariants || variants.length > 0;
      const reseller = !hasVariants && product.usesResellerPrice ? '<span class="reseller-chip">Reseller</span>' : '';
      const priceLabel = hasVariants ? variantPriceSummary(product) : escapeHtml(currencyMoney(product.price || product.priceUsdt || 0));
      const stockLabel = hasVariants
        ? String(variants.length || product.variantCount || 0) + ' options'
        : escapeHtml(product.stockLabel);
      return '<article class="product-card" data-product-id="' + product.id + '" tabindex="0" role="button" aria-label="Open ' + escapeHtml(product.name) + '">' +
        productMedia(product) +
        '<div>' +
          '<h3 class="product-name">' + customEmoji(productEmojiKey(product), "📦") + escapeHtml(product.name) + '</h3>' +
          '<p class="product-desc">' + escapeHtml(product.description || "No product note") + '</p>' +
          '<div class="row"><span class="price">' + priceLabel + '</span><span class="stock">' + stockLabel + '</span></div>' +
          (reseller ? '<div class="row" style="margin-top:6px"><span class="detail-price-note">Retail ' + escapeHtml(currencyMoney(product.retailPrice || product.retailPriceUsdt || 0)) + '</span>' + reseller + '</div>' : '') +
        '</div>' +
        '<span class="product-open" aria-hidden="true">&rsaquo;</span>' +
      '</article>';
    }

    function filteredProducts() {
      const query = state.query.trim().toLowerCase();
      const products = topLevelProducts();
      if (!query) return products;
      return products.filter((product) =>
        product.name.toLowerCase().includes(query) ||
        String(product.description || "").toLowerCase().includes(query) ||
        productVariants(product).some((variant) =>
          String(variant.name || "").toLowerCase().includes(query) ||
          String(variant.variantLabel || "").toLowerCase().includes(query) ||
          String(variant.description || "").toLowerCase().includes(query)
        )
      );
    }

    function renderHome() {
      const featured = topLevelProducts().slice(0, 4);
      byId("home").innerHTML =
        '<section class="hero">' +
          '<div class="brand-icon">' + logoHtml() + '</div>' +
          '<p class="eyebrow">Welcome back,</p>' +
          '<h2 class="hero-name">' + escapeHtml(displayName()) + '</h2>' +
          '<div class="hero-balance"><strong>' + currencyAmount(state.user.balanceUsdt) + '</strong><span>' + escapeHtml(currentCurrencyCode()) + '</span></div>' +
          '<div class="label">Wallet balance</div>' +
          '<div class="hero-actions">' +
            '<button class="btn ghost" type="button" data-action="deposit">' + customEmoji("deposit", "💰") + 'Deposit</button>' +
            '<button class="btn ghost" type="button" data-action="tab" data-tab="shop">' + customEmoji("shop", "🛒") + 'Browse</button>' +
          '</div>' +
        '</section>' +
        '<div class="label">Featured</div>' +
        '<section class="product-list">' +
          (featured.length ? featured.map(productCard).join("") : emptyHtml("No active products yet.")) +
        '</section>';
    }

    function renderShop() {
      const products = filteredProducts();
      byId("shop").innerHTML =
        '<input class="search" id="searchInput" type="search" autocomplete="off" placeholder="Search products..." value="' + escapeHtml(state.query) + '">' +
        '<div class="filter-row"><button class="chip active" type="button">All</button></div>' +
        '<section class="product-list">' +
          (products.length ? products.map(productCard).join("") : emptyHtml("No matching products.")) +
        '</section>';
      byId("searchInput").addEventListener("input", (event) => {
        state.query = event.target.value;
        renderShop();
        const input = byId("searchInput");
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      });
    }

    function renderOrders() {
      if (state.expandedOrderId === null && state.orders[0]) {
        state.expandedOrderId = state.orders[0].id;
      }
      byId("orders").innerHTML =
        '<div class="orders-head">' +
          '<h1>Order history</h1>' +
          '<label class="order-search-wrap">' +
            '<span aria-hidden="true">⌕</span>' +
            '<input type="search" data-action="orderSearch" value="' + escapeHtml(state.orderSearch || "") + '" placeholder="Search by order # or product name.">' +
          '</label>' +
        '</div>' +
        (state.orders.length
          ? '<div class="stack order-history-list">' + state.orders.map(orderCard).join("") + '</div>' +
            '<div id="ordersNoResults" class="empty" hidden>No orders match this search.</div>'
          : emptyHtml("No orders yet. Buy a product and it will appear here."));
      applyOrderSearchFilter();
    }

    function orderCard(order) {
      const expanded = String(state.expandedOrderId || "") === String(order.id);
      const searchText = [order.id, order.ref, order.productName, order.statusLabel, order.status].join(" ").toLowerCase();
      return '<article class="order-history-card" data-order-search="' + escapeHtml(searchText) + '">' +
        '<button class="order-summary-btn" type="button" data-action="toggleOrder" data-order-id="' + escapeHtml(order.id) + '">' +
          '<span class="order-summary-main">' +
            '<span class="order-summary-title"><span>' + escapeHtml(order.productName || "Order") + '</span><span class="order-ref-pill">#' + escapeHtml(rawOrderRefClient(order)) + '</span></span>' +
            '<span class="order-summary-sub">' + escapeHtml(formatDate(order.createdAt)) + ' · Qty ' + escapeHtml(order.quantity || 1) + '</span>' +
          '</span>' +
          '<span class="order-summary-price"><span>' + escapeHtml(currencyMoney(order.amountUsdt)) + '</span><span class="status ' + escapeHtml(order.status) + '">' + escapeHtml(order.statusLabel || prettyOrderStatus(order.status)) + '</span></span>' +
          '<span class="order-chev" aria-hidden="true">' + (expanded ? '⌃' : '⌄') + '</span>' +
        '</button>' +
        (expanded ? orderExpandedHtml(order) : '') +
      '</article>';
    }

    function rawOrderRefClient(order) {
      return String(order.ref || order.id || "-").replace(/^#+/, "");
    }

    function orderExpandedHtml(order) {
      const items = Array.isArray(order.items) ? order.items.filter(Boolean) : [];
      const method = order.paymentMethodLabel || order.network || "-";
      const unitPrice = Number(order.quantity || 0) > 0 ? Number(order.amountUsdt || 0) / Number(order.quantity || 1) : Number(order.amountUsdt || 0);
      const exactAmount = order.amountUniqueUsdt && order.amountUniqueUsdt !== order.amountUsdt
        ? orderDetailField("Payment amount", order.amountUniqueUsdt + " USDT")
        : "";
      const coupon = order.couponCode
        ? orderDetailField("Coupon", order.couponCode + " (-" + currencyMoney(order.couponDiscountUsdt || 0) + ")")
        : "";
      const reference = order.txHash ? orderDetailField("Reference", order.txHash) : "";
      const paid = order.paidAt ? orderDetailField("Paid", formatDate(order.paidAt)) : "";
      const delivered = order.deliveredAt ? orderDetailField("Delivered", formatDate(order.deliveredAt)) : "";
      return '<div class="order-expanded">' +
        '<div class="order-detail-grid">' +
          orderDetailField("Order #", rawOrderRefClient(order)) +
          orderDetailField("Placed", formatDate(order.createdAt)) +
          orderDetailField("Quantity", String(order.quantity || 1)) +
          orderDetailField("Unit price", currencyMoney(unitPrice)) +
          orderDetailField("Total paid", currencyMoney(order.amountUsdt)) +
          orderDetailField("Method", method) +
          exactAmount + paid + delivered + coupon + reference +
        '</div>' +
        '<div class="order-item-count">' + String(items.length || 0) + ' item(s)</div>' +
        '<div class="order-export-actions">' +
          '<button class="order-export-btn" type="button" data-action="copyOrderItems" data-order-id="' + escapeHtml(order.id) + '">Copy</button>' +
          '<button class="order-export-btn active" type="button" data-action="downloadOrderTxt" data-order-id="' + escapeHtml(order.id) + '">TXT</button>' +
          '<button class="order-export-btn" type="button" data-action="downloadOrderCsv" data-order-id="' + escapeHtml(order.id) + '">CSV</button>' +
        '</div>' +
        (items.length ? '<pre class="order-code-preview">' + escapeHtml(items.join("\n")) + '</pre>' : '<p class="small">' + escapeHtml(orderStatusNote(order)) + '</p>') +
        orderInstructionsHtml(order) +
      '</div>';
    }

    function orderDetailField(label, value) {
      return '<div class="order-detail-field"><strong>' + escapeHtml(label) + '</strong><span>' + escapeHtml(value || "-") + '</span></div>';
    }

    function orderInstructionsHtml(order) {
      const lines = instructionLines(order);
      if (!lines.length) return "";
      return '<section class="order-instructions">' +
        '<div class="order-instructions-title">ⓘ Important instructions</div>' +
        '<div class="order-instruction-box">' +
          lines.map((line, index) => '<div class="order-instruction-step"><b>' + String(index + 1) + '</b><span>' + escapeHtml(line) + '</span></div>').join("") +
        '</div>' +
      '</section>';
    }

    function instructionLines(order) {
      const description = String(order.productDescription || "").replace(/\r/g, "\n");
      const lines = description.split("\n").map((line) => line.replace(/^[-•\d.)\s]+/, "").trim()).filter(Boolean);
      if (lines.length) return lines.slice(0, 6);
      if ((order.items || []).length) {
        return [
          "Copy your delivered item exactly as shown.",
          "Use TXT or CSV if you need to save all order details.",
          "Contact support if the delivered item does not work.",
        ];
      }
      return [];
    }

    function applyOrderSearchFilter() {
      const query = String(state.orderSearch || "").trim().toLowerCase();
      const cards = [...document.querySelectorAll("#orders .order-history-card[data-order-search]")];
      let visible = 0;
      for (const card of cards) {
        const match = !query || String(card.dataset.orderSearch || "").includes(query);
        card.hidden = !match;
        if (match) visible += 1;
      }
      const noResults = byId("ordersNoResults");
      if (noResults) noResults.hidden = !query || visible > 0;
    }

    function orderStatusNote(order) {
      const status = String(order.status || "");
      if ((order.items || []).length) return "Delivery details are shown below.";
      if (status === "pending_payment") return "Payment is still pending for this order.";
      if (status === "manual_pending") return "Payment is verified. Owner delivery is pending.";
      if (status === "manual_accepted") return "Order accepted. Delivery is coming soon.";
      if (status === "no_stock") return "Payment is verified, but stock is empty. Owner will resolve this order.";
      if (status === "cancelled") return "This order was cancelled.";
      if (status === "refunded") return "This order was refunded to your wallet.";
      if (status === "delivered") return "Delivery details were sent in Telegram.";
      return "Order details are available here.";
    }

    function prettyOrderStatus(status) {
      const clean = String(status || "").replaceAll("_", " ").trim();
      return clean ? clean.replace(/\b\w/g, (char) => char.toUpperCase()) : "Unknown";
    }

    function showOrderDetailsSheet(order) {
      const items = Array.isArray(order.items) ? order.items : [];
      const exactAmount = order.amountUniqueUsdt && order.amountUniqueUsdt !== order.amountUsdt
        ? metricRow("Payment amount", order.amountUniqueUsdt + " USDT")
        : "";
      const coupon = order.couponCode
        ? metricRow("Coupon", order.couponCode + " (-" + currencyMoney(order.couponDiscountUsdt || 0) + ")")
        : "";
      const reference = order.txHash ? metricRow("Reference", order.txHash) : "";
      const paid = order.paidAt ? metricRow("Paid", formatDate(order.paidAt)) : "";
      const delivered = order.deliveredAt ? metricRow("Delivered", formatDate(order.deliveredAt)) : "";
      const method = order.paymentMethodLabel || order.network || "-";
      const received = items.length
        ? '<div class="label">Received</div>' + deliveryItemsHtml(items)
        : '<div class="detail-box order-detail-note">' + escapeHtml(orderStatusNote(order)) + '</div>';
      openSheet(
        '<div class="sheet-title"><span>Order Details</span><button class="icon-btn" type="button" data-action="closeSheet">' + customEmoji("close", "x", "solo") + '</button></div>' +
        '<section class="delivery-card">' +
          '<div class="delivery-title">' + escapeHtml(order.productName || "Order") + '</div>' +
          '<section class="metric-card">' +
            metricRow("Order ID# :", order.ref || ("#" + order.id)) +
            metricRow("Status", order.statusLabel || prettyOrderStatus(order.status)) +
            metricRow("Amount", currencyMoney(order.amountUsdt || 0)) +
            exactAmount +
            metricRow("Quantity", String(order.quantity || 1)) +
            metricRow("Method", method) +
            metricRow("Created", formatDate(order.createdAt)) +
            paid +
            delivered +
            coupon +
            reference +
          '</section>' +
          received +
        '</section>'
      );
    }

    function renderWallet() {
      const pendingCount = state.deposits.filter(depositIsLive).length;
      byId("wallet").innerHTML =
        '<div class="deposit-history-head">' +
          '<h1>Deposit history</h1>' +
          '<button class="btn" type="button" data-action="deposit">' + customEmoji("deposit", "$") + 'New deposit</button>' +
        '</div>' +
        '<section class="deposit-summary-grid">' +
          depositSummaryCard("Total deposited", currencyMoney(state.stats.totalDepositedUsdt)) +
          depositSummaryCard("Pending", String(pendingCount)) +
          depositSummaryCard("Total entries", String(state.stats.depositsCount || state.deposits.length)) +
        '</section>' +
        walletLiveHtml() +
        '<label class="order-search-wrap">' +
          '<span aria-hidden="true">⌕</span>' +
          '<input type="search" data-action="depositSearch" value="' + escapeHtml(state.depositSearch || "") + '" placeholder="Search by # / TxID / network / status">' +
        '</label>' +
        '<section class="stack" style="margin-top:14px">' +
          (state.deposits.length ? state.deposits.map(depositCard).join("") : emptyHtml("No deposits yet.")) +
        '</section>' +
        '<div id="depositsNoResults" class="empty" hidden>No deposits match this search.</div>';
      applyDepositSearchFilter();
    }

    function depositSummaryCard(label, value) {
      return '<article class="deposit-summary-card"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value) + '</strong></article>';
    }

    function walletTone(status, amount, reviewStage = "") {
      const clean = String(status || "").toLowerCase();
      const stage = String(reviewStage || "").toLowerCase();
      const numericAmount = Number(amount || 0);
      if (stage === "screenshot_needed" || stage === "manual_review" || stage === "verifying") return "pending";
      if (clean.includes("pending") || clean.includes("review") || clean.includes("manual")) return "pending";
      if (clean === "failed" || clean === "rejected" || clean === "cancelled" || clean === "canceled") return "rejected";
      if (clean === "credited" || clean === "completed") return "credit";
      if (numericAmount > 0) return "credit";
      if (numericAmount < 0) return "debit";
      return "neutral";
    }

    function signedWalletAmount(amount, tone) {
      const value = String(amount || "0");
      if (tone === "credit" && !value.startsWith("+") && value !== "0") return "+" + value;
      if (tone === "debit" && !value.startsWith("-") && value !== "0") return "-" + value;
      return value;
    }

    function depositIsLive(deposit) {
      const status = String(deposit.status || "").toLowerCase();
      const stage = String(deposit.reviewStage || "").toLowerCase();
      return stage === "screenshot_needed" ||
        stage === "manual_review" ||
        stage === "verifying" ||
        status.includes("pending") ||
        status.includes("review") ||
        status.includes("manual");
    }

    function liveDepositCount() {
      return state.deposits.filter(depositIsLive).length;
    }

    function walletLiveHtml() {
      const count = liveDepositCount();
      if (!count) return "";
      return '<div class="wallet-live">Live review active: ' + count + ' payment' + (count === 1 ? "" : "s") + ' will refresh here automatically.</div>';
    }

    function reviewStageLabel(deposit) {
      const stage = String(deposit.reviewStage || "").toLowerCase();
      if (stage === "screenshot_needed") return "Screenshot needed";
      if (stage === "manual_review") return "Admin review";
      if (stage === "manual_approved") return "Manual approved";
      if (stage === "manual_expired") return "Review expired";
      if (stage === "manual_rejected") return "Manual rejected";
      if (stage === "manual_cancelled") return "Cancelled";
      if (stage === "verifying") return "Verifying";
      return "";
    }

    function depositProgressText(deposit) {
      const stage = String(deposit.reviewStage || "").toLowerCase();
      const status = String(deposit.status || "").toLowerCase();
      if (stage === "screenshot_needed") return "Upload screenshot/video proof";
      if (stage === "manual_review") return "Admin review in progress";
      if (stage === "verifying" || status.includes("pending")) return "Waiting for verification";
      return "";
    }

    function depositProgressPercent(deposit) {
      const stage = String(deposit.reviewStage || "").toLowerCase();
      const status = String(deposit.status || "").toLowerCase();
      if (stage === "screenshot_needed") return 35;
      if (stage === "manual_review") return 70;
      if (stage === "verifying" || status.includes("pending")) return 45;
      return 0;
    }

    function depositProgressHtml(deposit) {
      if (!depositIsLive(deposit)) return "";
      const percent = Math.max(8, Math.min(92, depositProgressPercent(deposit)));
      return '<div class="deposit-progress">' +
        '<div class="deposit-progress-track"><span class="deposit-progress-fill" style="width:' + percent + '%"></span></div>' +
        '<div class="deposit-progress-meta"><span>' + escapeHtml(depositProgressText(deposit)) + '</span><b>' + percent + '%</b></div>' +
      '</div>';
    }

    function canUploadReviewProof(deposit) {
      const stage = String(deposit.reviewStage || "").toLowerCase();
      const status = String(deposit.status || "").toLowerCase();
      return (stage === "screenshot_needed" || stage === "manual_review") &&
        (status.includes("pending") || status.includes("review"));
    }

    function reviewUploadHtml(deposit) {
      if (!canUploadReviewProof(deposit)) return "";
      return '<div class="review-upload">' +
        '<div class="label">Upload proof</div>' +
        '<input class="file-input" id="reviewProofFile" type="file" accept="image/*,video/*">' +
        '<button class="btn full" type="button" data-action="uploadReviewProof" data-deposit-id="' + escapeHtml(deposit.id) + '">Upload screenshot / video</button>' +
        '<p class="small">Photo or video under 20 MB. It goes directly to admin manual review.</p>' +
      '</div>';
    }

    function depositCard(deposit) {
      const tone = walletTone(deposit.status, deposit.amountUsdt, deposit.reviewStage);
      const amount = escapeHtml(signedWalletAmount(deposit.amountUsdt, tone)) + " " + escapeHtml(deposit.creditedAsset || "USDT");
      const ref = String(deposit.externalReference || deposit.txHash || deposit.reference || "-");
      const searchText = [deposit.id, ref, deposit.network, deposit.statusLabel, deposit.status, deposit.asset].join(" ").toLowerCase();
      return '<button class="deposit-history-card order-click" type="button" data-deposit-id="' + escapeHtml(deposit.id) + '" data-deposit-search="' + escapeHtml(searchText) + '">' +
        '<div class="deposit-card-top">' +
          '<div><span class="deposit-ref-pill">#' + escapeHtml(String(deposit.id || "-")) + '</span> <span class="status ' + escapeHtml(deposit.status) + '">' + escapeHtml(deposit.statusLabel) + '</span>' +
          '<div class="order-meta" style="margin-top:8px">' + escapeHtml(formatDate(deposit.createdAt)) + '</div></div>' +
          '<div class="deposit-card-amount amount-state ' + escapeHtml(tone) + '">' + amount + '<small>' + escapeHtml(currencyMoney(deposit.amountUsdt)) + '</small></div>' +
        '</div>' +
        '<div class="deposit-card-grid">' +
          '<div class="deposit-field"><strong>Deposit #</strong><span>' + escapeHtml(String(deposit.id || "-")) + '</span></div>' +
          '<div class="deposit-field"><strong>Status</strong><span>' + escapeHtml(deposit.statusLabel || prettyOrderStatus(deposit.status)) + '</span></div>' +
          '<div class="deposit-field"><strong>Network</strong><span>' + escapeHtml(deposit.network || "-") + '</span></div>' +
          '<div class="deposit-field"><strong>Transaction</strong><span>' + escapeHtml(ref) + '</span></div>' +
        '</div>' +
        depositProgressHtml(deposit) +
      '</button>';
    }

    function applyDepositSearchFilter() {
      const query = String(state.depositSearch || "").trim().toLowerCase();
      const cards = [...document.querySelectorAll("#wallet .deposit-history-card[data-deposit-search]")];
      let visible = 0;
      for (const card of cards) {
        const match = !query || String(card.dataset.depositSearch || "").includes(query);
        card.hidden = !match;
        if (match) visible += 1;
      }
      const noResults = byId("depositsNoResults");
      if (noResults) noResults.hidden = !query || visible > 0;
    }

    function depositStatusNote(deposit) {
      const status = String(deposit.status || "").toLowerCase();
      const stage = String(deposit.reviewStage || "").toLowerCase();
      if (stage === "screenshot_needed") return "Upload payment proof here. This card will update after the screenshot/video is submitted.";
      if (stage === "manual_review") return "Screenshot received. Admin review is in progress and this wallet page refreshes live.";
      if (stage === "manual_approved") return "Manual review approved. Amount has been credited to your wallet.";
      if (stage === "manual_expired") return "Manual review expired after 24 hours. Admin may have been busy or offline.";
      if (stage === "manual_rejected") return "Manual review was rejected. No wallet balance was credited.";
      if (stage === "manual_cancelled") return "Manual review was cancelled.";
      if (status === "credited" || status === "completed") return "This deposit has been credited to your wallet.";
      if (status.includes("pending") || status.includes("review") || status.includes("manual")) return "This deposit is waiting for verification or manual review.";
      if (status === "failed" || status === "rejected" || status === "cancelled" || status === "canceled") return "This deposit was not credited. Check the reference and try again if needed.";
      return "Deposit details are shown here.";
    }

    function showDepositDetailsSheet(deposit) {
      const tone = walletTone(deposit.status, deposit.amountUsdt, deposit.reviewStage);
      const amount = signedWalletAmount(deposit.amountUsdt, tone) + " " + (deposit.creditedAsset || "USDT");
      const uniqueAmount = deposit.amountUniqueUsdt && deposit.amountUniqueUsdt !== deposit.amountUsdt
        ? metricRow("Payment amount", deposit.amountUniqueUsdt + " USDT")
        : "";
      const reference = deposit.externalReference ? metricRow("Reference", deposit.externalReference) : "";
      const txHash = deposit.txHash && deposit.txHash !== deposit.externalReference ? metricRow("TX / Hash", deposit.txHash) : "";
      const source = deposit.source ? metricRow("Source", deposit.source) : "";
      const expires = deposit.expiresAt ? metricRow("Expires", formatDate(deposit.expiresAt)) : "";
      const reviewStage = deposit.reviewStage ? metricRow("Review stage", reviewStageLabel(deposit)) : "";
      openSheet(
        '<div class="sheet-title"><span>Deposit Details</span><button class="icon-btn" type="button" data-action="closeSheet">' + customEmoji("close", "x", "solo") + '</button></div>' +
        '<section class="delivery-card">' +
          '<div class="delivery-title">' + escapeHtml(deposit.network || "Deposit") + '</div>' +
          '<section class="metric-card">' +
            metricRow("Deposit ID", "#" + String(deposit.id || "-")) +
            metricRow("Status", deposit.statusLabel || prettyOrderStatus(deposit.status)) +
            metricRow("Amount", amount) +
            uniqueAmount +
            metricRow("Asset", deposit.asset || "USDT") +
            metricRow("Method", deposit.network || "-") +
            metricRow("Created", formatDate(deposit.createdAt)) +
            expires +
            reviewStage +
            reference +
            txHash +
            source +
          '</section>' +
          depositProgressHtml(deposit) +
          reviewUploadHtml(deposit) +
          '<div class="detail-box order-detail-note">' + escapeHtml(depositStatusNote(deposit)) + '</div>' +
        '</section>'

    }

    function transactionCard(tx) {
      const direction = tx.direction || "neutral";

      return '<article class="transaction-card">' +
        '<div class="row">' +

          '<div class="tx-amount ' + escapeHtml(direction) + '">' + escapeHtml(signedCurrencyMoney(tx.amountUsdt, direction)) + '</div>' +

        '<div class="order-meta">' + escapeHtml(formatDate(tx.createdAt)) + reference + '</div>' +

        '<section class="action-card">' +
          actionRow("Bot support", "support") +
          actionRow("Open bot", "openBot") +
        '</section>';

      return '<article class="account-stat"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value) + '</strong></article>';
    }

    function renderProduct() {
      const product = state.product;

        byId("product").innerHTML = emptyHtml("Product not found.");
